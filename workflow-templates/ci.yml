name: CI

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"
      bun-version:
        description: "Bun version"
        required: false
        type: string
        default: "latest"
      working-directory:
        description: "Working directory for monorepo packages"
        required: false
        type: string
        default: "."
      skip-e2e:
        description: "Skip E2E tests"
        required: false
        type: boolean
        default: false
      skip-lint:
        description: "Skip linting"
        required: false
        type: boolean
        default: false
      skip-typecheck:
        description: "Skip type checking"
        required: false
        type: boolean
        default: false

jobs:
  ci:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        if: ${{ !inputs.skip-lint }}
        run: bun run lint

      - name: Typecheck
        if: ${{ !inputs.skip-typecheck }}
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-e2e }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Check for Playwright config
        id: check-playwright
        run: |
          if [ -f "playwright.config.ts" ] || [ -f "playwright.config.js" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check-playwright.outputs.found == 'true'
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.check-playwright.outputs.found == 'true'
        run: bunx playwright install --with-deps

      - name: Run E2E tests
        if: steps.check-playwright.outputs.found == 'true'
        run: bun run test:e2e
